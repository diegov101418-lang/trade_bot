<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trading Bot PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #0b0f19;
    color: #e6e6e6;
    font-family: Arial;
    padding: 20px;
}

h1 { color: #ff3b3b; }

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

.card {
    background: #121826;
    padding: 15px;
    border-radius: 10px;
}

button {
    padding: 8px;
    margin: 3px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.green { color: #00ff9c; }
.red { color: #ff4d4d; }

table {
    width: 100%;
    text-align: center;
}
</style>
</head>

<body>

<h1>🚀 Trading Bot PRO</h1>

<p>
Modo: <b id="mode"></b> |
Estado: <b id="running"></b> |
Estrategia: <b id="strategy"></b>
</p>

<div class="card">
    <a href="/start"><button>Start</button></a>
    <a href="/stop"><button>Stop</button></a>
    <a href="/mode/demo"><button>Demo</button></a>
    <a href="/mode/real"><button>Real</button></a>

    <hr>

    <a href="/strategy/auto"><button>Auto</button></a>
    <a href="/strategy/trend"><button>Trend</button></a>
    <a href="/strategy/scalping"><button>Scalping</button></a>
</div>

<div class="grid">

<div class="card">
    <h3>Balance</h3>
    <h2 id="balance">0</h2>
</div>

<div class="card">
    <h3>Winrate</h3>
    <h2 id="winrate">0%</h2>
</div>

<div class="card">
    <h3>Trades</h3>
    <h2 id="trades">0</h2>
</div>

</div>

<div class="card">
    <canvas id="chart"></canvas>
</div>

<div class="card">
    <h3>Posiciones</h3>
    <table id="positions"></table>
</div>

<script>
let chart;

async function update() {

    const res = await fetch('/api/data');
    const data = await res.json();

    document.getElementById("balance").innerText = data.balance.toFixed(2);
    document.getElementById("winrate").innerText = data.stats.winrate + "%";
    document.getElementById("trades").innerText = data.stats.wins + data.stats.losses;

    document.getElementById("mode").innerText = data.mode;
    document.getElementById("running").innerText = data.running ? "ON" : "OFF";
    document.getElementById("strategy").innerText = data.strategy;

    // chart
    if (!chart) {
        const ctx = document.getElementById("chart");
        chart = new Chart(ctx, {
            type: "line",
            data: {
                labels: data.history.map((_, i) => i),
                datasets: [{
                    data: data.history
                }]
            }
        });
    } else {
        chart.data.labels = data.history.map((_, i) => i);
        chart.data.datasets[0].data = data.history;
        chart.update();
    }

    // tabla
    let table = `
    <tr>
        <th>Symbol</th>
        <th>Entry</th>
        <th>Actual</th>
        <th>PnL %</th>
    </tr>`;

    data.positions.forEach(p => {

        let pnl = 0;
        if (p.current_price && p.entry_price) {
            pnl = ((p.current_price - p.entry_price) / p.entry_price) * 100;
        }

        let color = pnl >= 0 ? "green" : "red";

        table += `
        <tr>
            <td>${p.symbol}</td>
            <td>${p.entry_price}</td>
            <td>${p.current_price || "-"}</td>
            <td class="${color}">${pnl.toFixed(2)}%</td>
        </tr>`;
    });

    document.getElementById("positions").innerHTML = table;
}

setInterval(update, 3000);
</script>

</body>
</html>
